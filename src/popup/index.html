<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enterprise Assistant</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app" class="app">

    <!-- Login View -->
    <div id="view-login" class="view hidden">
      <div class="login-header">
        <h1 class="brand">Enterprise Assistant</h1>
        <p class="brand-sub">Sign in to get started</p>
      </div>
      <form id="login-form" class="login-form" autocomplete="on">
        <div class="field">
          <label for="server-url">ACP Server URL</label>
          <input
            id="server-url"
            type="url"
            placeholder="https://ambient-api-server-xyz.example.com"
            autocomplete="url"
            required
          >
        </div>
        <div class="field">
          <label for="username">Username</label>
          <input
            id="username"
            type="text"
            placeholder="username"
            autocomplete="username"
            required
          >
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            placeholder="password"
            autocomplete="current-password"
            required
          >
        </div>
        <div id="login-error" class="error hidden"></div>
        <button type="submit" id="login-btn" class="btn btn-primary">
          Sign In
        </button>
      </form>
    </div>

    <!-- Chat View -->
    <div id="view-chat" class="view hidden">
      <header class="panel-header">
        <div class="agent-info">
          <span id="agent-name" class="agent-name">Enterprise Assistant</span>
        </div>
        <div class="header-actions">
          <button id="btn-context" class="btn btn-ghost btn-icon" title="Include page context">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
          </button>
          <button id="btn-new-chat" class="btn btn-ghost btn-icon" title="New conversation">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
          <button id="btn-settings" class="btn btn-ghost btn-icon" title="Settings">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
        </div>
      </header>

      <div id="context-banner" class="context-banner hidden">
        <span>Page context will be included</span>
        <button id="btn-remove-context" class="btn-link">Remove</button>
      </div>

      <main id="messages" class="messages" role="log" aria-live="polite"></main>

      <div id="typing-indicator" class="typing-indicator hidden">
        <span></span><span></span><span></span>
      </div>

      <footer class="input-area">
        <textarea
          id="message-input"
          class="message-input"
          placeholder="Ask anything..."
          rows="1"
          aria-label="Message"
        ></textarea>
        <button id="btn-send" class="btn btn-primary btn-send" aria-label="Send">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2 21L23 12 2 3v7l15 2-15 2z"/>
          </svg>
        </button>
      </footer>
    </div>

    <!-- Settings View -->
    <div id="view-settings" class="view hidden">
      <header class="panel-header">
        <button id="btn-back" class="btn btn-ghost btn-icon" title="Back">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <h2 class="view-title">Settings</h2>
      </header>
      <div class="settings-body">
        <div class="field">
          <label for="settings-server-url">ACP Server URL</label>
          <input
            id="settings-server-url"
            type="url"
            placeholder="https://ambient-api-server-xyz.example.com"
            autocomplete="url"
          >
        </div>
        <div class="field field-row">
          <label for="settings-notifications">Notifications</label>
          <input id="settings-notifications" type="checkbox">
        </div>
        <div class="field">
          <label for="settings-theme">Theme</label>
          <select id="settings-theme">
            <option value="system">System default</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </div>
        <button id="btn-save-settings" class="btn btn-primary">Save</button>
        <button id="btn-signout" class="btn btn-danger">Sign out</button>
        <p id="settings-status" class="status-msg hidden"></p>
      </div>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
