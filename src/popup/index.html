<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enterprise Assistant</title>
  <!-- CSS injected by webpack -->
</head>
<body>
  <div id="app">
    <!-- Auth screen -->
    <div id="auth-screen" class="screen hidden" aria-label="Sign in">
      <div class="auth-content">
        <div class="logo">
          <img src="../assets/icons/icon48.png" alt="Enterprise Assistant" />
          <h1>Enterprise Assistant</h1>
        </div>
        <p class="auth-description">Sign in with your enterprise account to get started.</p>
        <button id="login-btn" class="btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/>
          </svg>
          Sign In
        </button>
      </div>
    </div>

    <!-- Main screen -->
    <div id="main-screen" class="screen hidden">
      <!-- Header -->
      <header class="header">
        <div class="header-left">
          <img src="../assets/icons/icon16.png" alt="" class="header-icon" aria-hidden="true" />
          <span class="header-title">Enterprise Assistant</span>
        </div>
        <div class="header-actions">
          <button id="export-btn" class="icon-btn hidden" title="Export conversation" aria-label="Export conversation as Markdown">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
            </svg>
          </button>
          <button id="new-chat-btn" class="icon-btn" title="New chat" aria-label="New chat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M12 5v14M5 12h14"/>
            </svg>
          </button>
          <button id="settings-btn" class="icon-btn" title="Settings" aria-label="Open settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Tab bar (ARIA tablist) -->
      <div class="tab-bar" role="tablist" aria-label="Assistant panels">
        <button class="tab active" data-tab="chat" role="tab" aria-selected="true" aria-controls="chat-panel" id="tab-chat">Chat</button>
        <button class="tab" data-tab="summary" role="tab" aria-selected="false" aria-controls="summary-panel" id="tab-summary">Summary</button>
        <button class="tab" data-tab="tasks" role="tab" aria-selected="false" aria-controls="tasks-panel" id="tab-tasks">Tasks</button>
      </div>

      <!-- Chat panel -->
      <div id="chat-panel" class="panel active" role="tabpanel" aria-labelledby="tab-chat">
        <div id="chat-messages" class="chat-messages" aria-live="polite" aria-label="Conversation">
          <div class="empty-state">
            <p>Ask me anything, or type <kbd>/</kbd> for prompt templates.</p>
          </div>
        </div>

        <!-- Slash-command autocomplete menu -->
        <div id="template-menu" class="template-menu hidden" role="listbox" aria-label="Prompt templates"></div>

        <div class="context-badge hidden" id="context-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          <span id="context-label">Page context included</span>
          <button id="remove-context-btn" class="remove-context" aria-label="Remove context">×</button>
        </div>

        <div class="chat-input-row">
          <button id="attach-context-btn" class="icon-btn" title="Include page context" aria-label="Attach page context">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
          </button>
          <textarea
            id="chat-input"
            class="chat-input"
            placeholder="Ask anything, or type / for templates…"
            rows="1"
            aria-label="Chat message input"
            aria-multiline="true"
          ></textarea>
          <button id="send-btn" class="icon-btn send-btn" title="Send" aria-label="Send message" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Summary panel -->
      <div id="summary-panel" class="panel" role="tabpanel" aria-labelledby="tab-summary" hidden>
        <div class="panel-actions">
          <button id="summarize-btn" class="btn btn-primary">Summarize This Page</button>
        </div>
        <div id="summary-content" class="summary-content hidden" aria-live="polite">
          <h3>Summary</h3>
          <p id="summary-text"></p>
          <h3>Key Points</h3>
          <ul id="key-points-list"></ul>
          <div id="action-items-section" class="hidden">
            <h3>Action Items</h3>
            <ul id="action-items-list"></ul>
          </div>
        </div>
      </div>

      <!-- Tasks panel -->
      <div id="tasks-panel" class="panel" role="tabpanel" aria-labelledby="tab-tasks" hidden>
        <div class="panel-actions">
          <button id="add-task-btn" class="btn btn-primary" aria-expanded="false" aria-controls="add-task-form">+ Add Task</button>
        </div>
        <div id="add-task-form" class="task-form hidden" aria-hidden="true">
          <label for="task-title-input" class="sr-only">Task title</label>
          <input type="text" id="task-title-input" placeholder="Task title" class="input" required />
          <label for="task-desc-input" class="sr-only">Description (optional)</label>
          <textarea id="task-desc-input" placeholder="Description (optional)" class="input" rows="2"></textarea>
          <label for="task-priority-select" class="sr-only">Priority</label>
          <select id="task-priority-select" class="input">
            <option value="low">Low priority</option>
            <option value="medium" selected>Medium priority</option>
            <option value="high">High priority</option>
          </select>
          <div class="form-actions">
            <button id="save-task-btn" class="btn btn-primary btn-sm">Save</button>
            <button id="cancel-task-btn" class="btn btn-secondary btn-sm">Cancel</button>
          </div>
        </div>
        <ul id="tasks-list" class="tasks-list" aria-label="Task list"></ul>
      </div>
    </div>

    <!-- Loading overlay -->
    <div id="loading" class="loading hidden" role="status" aria-label="Loading">
      <div class="spinner"></div>
    </div>

    <!-- User info bar -->
    <div id="user-bar" class="user-bar hidden" aria-label="Signed-in user">
      <img id="user-avatar" class="user-avatar" src="" alt="" aria-hidden="true" />
      <span id="user-name" class="user-name"></span>
      <button id="logout-btn" class="btn-link">Sign out</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
