<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enterprise Assistant — Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header class="page-header">
      <h1>Enterprise Assistant Settings</h1>
    </header>

    <main class="settings-main">
      <section class="section">
        <h2>Connection</h2>
        <div class="field">
          <label for="acp-url">ACP Server URL</label>
          <input
            id="acp-url"
            type="url"
            placeholder="https://ambient-api-server-xyz.example.com"
            autocomplete="url"
          >
          <p class="hint">The base URL of your ACP API server</p>
        </div>
      </section>

      <section class="section">
        <h2>Appearance</h2>
        <div class="field">
          <label for="theme">Theme</label>
          <select id="theme">
            <option value="system">System default</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </div>
      </section>

      <section class="section">
        <h2>Notifications</h2>
        <div class="field field-row">
          <label for="notifications">Enable desktop notifications</label>
          <input id="notifications" type="checkbox">
        </div>
      </section>

      <div class="actions">
        <button id="btn-save" class="btn btn-primary">Save Settings</button>
        <p id="status" class="status hidden"></p>
      </div>
    </main>
  </div>
  <script src="options.js"></script>
</body>
</html>
