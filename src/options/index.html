<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Enterprise Assistant — Settings</title>
</head>
<body>
  <div class="container">
    <header class="page-header">
      <img src="../assets/icons/icon48.png" alt="Enterprise Assistant" class="logo" />
      <h1>Enterprise Assistant Settings</h1>
    </header>

    <form id="settings-form">
      <!-- ACP Connection -->
      <section class="section">
        <h2 class="section-title">Agent Control Plane</h2>
        <div class="field">
          <label for="api-endpoint">ACP Server URL</label>
          <input type="url" id="api-endpoint" name="apiEndpoint" class="input" />
          <p class="hint">The Agent Control Plane API server URL. Authentication and model routing are managed by ACP.</p>
        </div>
      </section>

      <!-- Behavior -->
      <section class="section">
        <h2 class="section-title">Behavior</h2>
        <div class="field toggle-row">
          <div>
            <label>Enable notifications</label>
            <p class="hint">Desktop notifications for completed tasks and updates.</p>
          </div>
          <label class="toggle">
            <input type="checkbox" id="notifications-enabled" name="notificationsEnabled" />
            <span class="toggle-track"></span>
          </label>
        </div>
      </section>

      <!-- Appearance -->
      <section class="section">
        <h2 class="section-title">Appearance</h2>
        <div class="field">
          <label for="theme">Theme</label>
          <select id="theme" name="theme" class="input">
            <option value="system">System default</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </div>
      </section>

      <!-- Hidden fields for internal settings -->
      <input type="hidden" id="proxy-endpoint" name="proxyEndpoint" value="" />
      <input type="hidden" id="anthropic-api-key" name="anthropicApiKey" value="" />
      <input type="hidden" id="model-id" name="modelId" value="claude-sonnet-4-6" />
      <input type="hidden" id="max-tokens" name="maxTokens" value="4096" />
      <input type="hidden" id="temperature" name="temperature" value="0.7" />
      <input type="hidden" id="sso-provider" name="ssoProvider" value="keycloak" />
      <input type="hidden" id="sso-client-id" name="ssoClientId" value="ambient-browser-extension" />
      <input type="hidden" id="sso-okta-domain" name="ssoOktaDomain" value="" />
      <input type="hidden" id="sso-keycloak-issuer" name="ssoKeycloakIssuer" value="" />
      <input type="hidden" id="sso-auth-url" name="ssoAuthUrl" value="" />
      <input type="hidden" id="sso-token-url" name="ssoTokenUrl" value="" />
      <input type="hidden" id="enable-page-context" name="enablePageContext" value="false" />

      <div class="form-actions">
        <button type="submit" class="btn btn-primary" id="save-btn">Save Settings</button>
        <button type="button" class="btn btn-secondary" id="reset-btn">Reset to Defaults</button>
        <span id="save-status" class="save-status hidden"></span>
      </div>
    </form>
  </div>
  <script src="options.js"></script>
</body>
</html>
