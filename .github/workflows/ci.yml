name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build, Lint, Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --ci --coverage

      - name: Build
        run: npm run build

      - name: Validate manifest
        run: |
          node -e "
            const m = require('./dist/manifest.json');
            if (m.manifest_version !== 3) process.exit(1);
            if (!m.background?.service_worker) process.exit(1);
            console.log('Manifest OK:', m.name, m.version);
          "

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-assistant-${{ github.sha }}
          path: dist/
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Check for hardcoded secrets
        run: |
          # Fail if any file contains what looks like an Anthropic API key
          if grep -r --include="*.ts" --include="*.js" "sk-ant-api" src/ 2>/dev/null; then
            echo "ERROR: Hardcoded Anthropic API key found in source"
            exit 1
          fi
          echo "No hardcoded API keys found"
